<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viktorina Ilovasi</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e2f;
            --text-color: #f5f6fa;
            --text-muted: #a4b0be;
            --border-color: #3b3b5e;
            --primary: #5f27cd;
            --primary-hover: #341f97;
            --success: #2ecc71;
            --success-bg: rgba(46, 204, 113, 0.15);
            --danger: #ff4757;
            --danger-bg: rgba(255, 71, 87, 0.15);
            --warning: #ffa502;
            --option-hover: #2f3542;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none !important;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--warning);
            min-width: 45px;
            text-align: center;
        }

        .timer.danger {
            color: var(--danger);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: var(--danger);
        }

        .btn-danger:hover {
            background-color: #ff6b81;
        }

        /* Question Styles */
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background-color: transparent;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover:not(.disabled) {
            background-color: var(--option-hover);
            border-color: var(--text-muted);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option.correct {
            background-color: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
        }

        .option.wrong {
            background-color: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Result Styles */
        .result-screen {
            text-align: center;
            padding: 20px 0;
        }

        .result-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .feedback {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .question-text { font-size: 1.1rem; }
            .option { font-size: 1rem; padding: 12px 15px; }
            .header { flex-wrap: wrap; gap: 15px; }
            .stats { flex-direction: column; gap: 15px; }
        }
    </style>
</head>

    <div class="container" id="app">

        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">

                <div class="progress">Savol <span id="current-q">1</span> / <span id="total-q">0</span></div>

                    <span>⏳</span>
                    <div class="timer" id="timer">30</div>
                </div>
                <button class="btn btn-danger" id="finish-btn">Tugatish</button>
            </div>
            
            <div class="question-text" id="question-text">Savol matni</div>
            
            <div class="options" id="options-container">
                <!-- Variantlar JS orqali qo'shiladi -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result-screen hidden">
            <h2>Natijalar</h2>
            
            <div class="score-circle">
                <span id="res-percent">0</span>%
            </div>

            <div class="feedback" id="res-feedback">A'lo</div>

            <div class="stats">

                    <span class="stat-value" id="res-total">0</span>
                    <span class="stat-label">Jami savollar</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="res-correct">0</span>
                    <span class="stat-label">To'g'ri javoblar</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="res-wrong">0</span>
                    <span class="stat-label">Noto'g'ri / Javobsiz</span>
                </div>
            </div>

        </div>

    <script>
        // DOM Elements
        const loadingScreen = document.getElementById('loading');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const currentQEl = document.getElementById('current-q');
        const totalQEl = document.getElementById('total-q');
        const timerEl = document.getElementById('timer');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const finishBtn = document.getElementById('finish-btn');

        // State Variables
        let allQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 30;
        let timerInterval;
        let nextTimeout;
        let isAnswered = false;

        // 1. Data Parser Function
        function parseRawData() {
            const rawData = document.getElementById('quizData').textContent.trim();
            const lines = rawData.split('\n').map(l => l.trim()).filter(l => l);
            
            let questions = [];
            let currentQ = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                // Regex: Starts with digit(s) followed by a dot
                if (/^\d+\./.test(line)) {
                    if (currentQ && currentQ.options.length === 4) {
                        questions.push(currentQ);
                    }
                    currentQ = {
                        text: line.replace(/^\d+\.\s*/, ''),
                        options: [],
                        correctOptionOriginalText: '' 
                    };
                } 
                // Regex: Starts with A., B., C., or D.
                else if (/^[A-D]\./.test(line) && currentQ) {
                    let optText = line.replace(/^[A-D]\.\s*/, '');
                    currentQ.options.push(optText);
                    
                    // Asl ma'lumotlarda to'g'ri javob har doim A variantida berilgan (fakt)
                    if (line.startsWith('A.')) {
                        currentQ.correctOptionOriginalText = optText;
                    }
                }
            }
            if (currentQ && currentQ.options.length === 4) {
                questions.push(currentQ);
            }
            return questions;
        }

        // 2. Fisher-Yates Shuffle
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 3. Initialize Quiz
        function initQuiz() {
            allQuestions = parseRawData();
            if (allQuestions.length === 0) {
                loadingScreen.textContent = "Xatolik: Savollar topilmadi.";
                return;
            }

            // Shuffle questions
            allQuestions = shuffleArray(allQuestions);
            
            totalQEl.textContent = allQuestions.length;
            
            loadingScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            loadQuestion();
        }

        // 4. Load Single Question
        function loadQuestion() {
            isAnswered = false;
            timeLeft = 30;
            timerEl.textContent = timeLeft;
            timerEl.classList.remove('danger');
            
            clearInterval(timerInterval);
            startTimer();

            const q = allQuestions[currentQuestionIndex];
            currentQEl.textContent = currentQuestionIndex + 1;
            questionTextEl.textContent = q.text;
            
            optionsContainer.innerHTML = '';
            
            // Shuffle options
            let shuffledOptions = shuffleArray([...q.options]);
            
            shuffledOptions.forEach((optText, index) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                
                // Letter prefix A, B, C, D
                const letter = String.fromCharCode(65 + index);
                optDiv.innerHTML = `<strong>${letter}.</strong> <span>${optText}</span>`;
                
                // Store actual text for checking correctness later
                optDiv.dataset.text = optText;
                
                optDiv.onclick = () => handleSelectOption(optDiv, q.correctOptionOriginalText);
                optionsContainer.appendChild(optDiv);
            });
        }

        // 5. Handle Option Click
        function handleSelectOption(selectedDiv, correctAnswerText) {
            if (isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);
            
            const allOptionDivs = optionsContainer.querySelectorAll('.option');
            const selectedText = selectedDiv.dataset.text;
            
            allOptionDivs.forEach(div => {
                div.classList.add('disabled');
                
                // To'g'ri javobni yashil qilish
                if (div.dataset.text === correctAnswerText) {
                    div.classList.add('correct');
                }
            });

            // Tekshirish
            if (selectedText === correctAnswerText) {
                score++;
            } else {
                selectedDiv.classList.add('wrong');
            }

            // Keyingi savolga avtomatik o'tish (2.5 soniya kutish)
            nextTimeout = setTimeout(nextQuestion, 2500);
        }

        // 6. Timer System
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 5) {
                    timerEl.classList.add('danger');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        function handleTimeOut() {
            isAnswered = true;
            const q = allQuestions[currentQuestionIndex];
            const allOptionDivs = optionsContainer.querySelectorAll('.option');
            
            allOptionDivs.forEach(div => {
                div.classList.add('disabled');
                if (div.dataset.text === q.correctOptionOriginalText) {
                    div.classList.add('correct'); // To'g'ri javobni ko'rsatish
                }
            });

            nextTimeout = setTimeout(nextQuestion, 2500);
        }

        // 7. Next Question or Finish
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < allQuestions.length) {
                // Kichik animatsiya effekti uchun
                quizScreen.style.animation = 'none';
                quizScreen.offsetHeight; 
                quizScreen.style.animation = 'fadeIn 0.4s ease-in-out';
                
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 8. Result Screen
        function showResults() {
            clearInterval(timerInterval);
            clearTimeout(nextTimeout);
            
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            const total = allQuestions.length;
            const percentage = Math.round((score / total) * 100);

            document.getElementById('res-total').textContent = total;
            document.getElementById('res-correct').textContent = score;
            document.getElementById('res-wrong').textContent = total - score;
            document.getElementById('res-percent').textContent = percentage;

            const feedbackEl = document.getElementById('res-feedback');
            const scoreCircle = document.querySelector('.score-circle');

            if (percentage >= 90) {
                feedbackEl.textContent = "A'lo natija! 🎉";
                feedbackEl.style.color = "var(--success)";
                scoreCircle.style.borderColor = "var(--success)";
            } else if (percentage >= 60) {
                feedbackEl.textContent = "Yaxshi natija! 👍";
                feedbackEl.style.color = "var(--warning)";
                scoreCircle.style.borderColor = "var(--warning)";
            } else {
                feedbackEl.textContent = "Qayta urinib ko'ring! 📚";
                feedbackEl.style.color = "var(--danger)";
                scoreCircle.style.borderColor = "var(--danger)";
            }
        }

        // Event Listeners
        finishBtn.addEventListener('click', () => {
            if(confirm("Testni hozir tugatmoqchimisiz? Javob berilmagan savollar noto'g'ri deb hisoblanadi.")) {
                showResults();
            }
        });

        // App Start
        window.onload = initQuiz;
    </script>
</body>
</html>
